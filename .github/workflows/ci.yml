name: CI

on:
  push:
    branches: [main]
  pull_request:

# The workflow only reads the repo; no write access is needed.
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Build the dashboard first: ui/ writes into internal/webui/dist, which
      # is go:embed'd, so the UI must exist before the Go build/tests run.
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - name: Build UI
        working-directory: ui
        run: |
          npm ci
          npm run build

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Test
        run: go test ./...
      - name: Test (race)
        run: go test -race ./...
